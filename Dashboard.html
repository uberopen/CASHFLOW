<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  /* ── Light mode (default — matches Quantro clean SaaS aesthetic) ── */
  :root {
    --cf-navy0: #F8F9FB;
    --cf-navy1: #FFFFFF;
    --cf-navy2: #F3F4F6;
    --cf-navy3: #ECEEF2;
    --cf-navyLine: #E5E7EB;
    --cf-ink: #111827;
    --cf-inkDim: #4B5563;
    --cf-inkMute: #9CA3AF;
    --cf-cardShadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.08);
    --cf-cardBorder: transparent;
    --cf-sidebarShadow: 1px 0 0 #E9EAEC;

    /* ── Design system aliases — map --color-* to --cf-* so both naming
          conventions resolve correctly in both themes.
          These update automatically when html.light-mode / html.dark-mode
          toggles because --cf-* vars are re-declared there.              ── */
    --color-bg-page:        var(--cf-navy0);
    --color-bg-card:        var(--cf-navy1);
    --color-bg-secondary:   var(--cf-navy2);
    --color-bg-tertiary:    var(--cf-navy3);
    --color-border:         var(--cf-navyLine);
    --color-card-border:    var(--cf-cardBorder);
    --color-card-shadow:    var(--cf-cardShadow);
    --color-sidebar-shadow: var(--cf-sidebarShadow);
    --color-text-primary:   var(--cf-ink);
    --color-text-secondary: var(--cf-inkDim);
    --color-text-muted:     var(--cf-inkMute);

    /* Static accent tokens — needed by components using var(--color-*) */
    --color-green-glow:     #3EE6A8;
    --color-blue:           #3D7BFF;
    --color-cyan:           #6FE8FF;
    --color-amber-semantic: #D97706;
    --color-red-semantic:   #DC2626;
    --color-sidebar-bg:     #FFFFFF;  /* light default — overridden per theme below */

    /* CashIQ FAB shadow — theme-adaptive */
    --cashiq-fab-shadow:       0 4px 16px rgba(0,0,0,0.12);
    --cashiq-fab-shadow-hover: 0 8px 24px rgba(0,0,0,0.16);
  }
  html.light-mode {
    --cf-navy0: #F8F9FB;
    --cf-navy1: #FFFFFF;
    --cf-navy2: #F3F4F6;
    --cf-navy3: #ECEEF2;
    --cf-navyLine: #E5E7EB;
    --cf-ink: #111827;
    --cf-inkDim: #4B5563;
    --cf-inkMute: #9CA3AF;
    --cf-cardShadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.08);
    --cf-cardBorder: transparent;
    --cf-sidebarShadow: 1px 0 0 #E9EAEC;
    --color-sidebar-bg: #FFFFFF;
    --cashiq-fab-shadow:       0 4px 16px rgba(0,0,0,0.12);
    --cashiq-fab-shadow-hover: 0 8px 24px rgba(0,0,0,0.16);
    --kpi-hover-shadow:        0 8px 24px rgba(0,0,0,0.1);
  }
  /* ── Dark mode (opt-in) ───────────────────────────────────────────── */
  html.dark-mode {
    --cf-navy0: #0A0F1C;
    --cf-navy1: #0F1629;
    --cf-navy2: #141D35;
    --cf-navy3: #1A2540;
    --cf-navyLine: #1E2D4A;
    --cf-ink: #F0F4FF;
    --cf-inkDim: #9BAAC8;
    --cf-inkMute: #5C6B8A;
    --cf-cardShadow: none;
    --cf-cardBorder: #1E2D4A;
    --cf-sidebarShadow: none;
    --color-sidebar-bg: #000000;
    --cashiq-fab-shadow:       0 4px 6px -1px rgba(0,0,0,0.07), 0 10px 30px -4px rgba(61,123,255,0.18);
    --cashiq-fab-shadow-hover: 0 8px 12px -2px rgba(0,0,0,0.09), 0 20px 40px -4px rgba(61,123,255,0.24);
    --kpi-hover-shadow:        0 8px 24px rgba(0,0,0,0.3);
  }
  html.dark-mode body { background: #0A0F1C; color: #F0F4FF; }
  html.dark-mode .app-root { background: #0A0F1C; }
  html.dark-mode .app-root,
  html.dark-mode .screen-scroll {
    background-image:
      linear-gradient(rgba(61,123,255,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(61,123,255,0.07) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  html.light-mode .app-root,
  html.light-mode .screen-scroll {
    background-image:
      linear-gradient(rgba(61,123,255,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(61,123,255,0.06) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  html.dark-mode input, html.dark-mode select, html.dark-mode textarea { background: #141D35 !important; color: #F0F4FF !important; border-color: #1E2D4A !important; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  #root { height: 100%; display: flex; flex-direction: column; }
  body {
    background: var(--cf-navy0);
    font-family: 'Inter', 'Manrope', sans-serif;
    color: var(--cf-ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }
  input, button, select, textarea { font-family: 'Inter', 'Manrope', sans-serif; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--cf-navyLine); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--cf-inkMute); }

  button { cursor: pointer; }

  /* ── Focus states ────────────────────────────────────── */
  *:focus-visible {
    outline: 2px solid #3D7BFF;
    outline-offset: 2px;
    border-radius: 6px;
  }

  button:focus-visible,
  [role="button"]:focus-visible {
    outline: 2px solid #3D7BFF;
    outline-offset: 2px;
  }

  input:focus-visible,
  select:focus-visible,
  textarea:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px rgba(61,123,255,0.2);
    border-color: #3D7BFF !important;
  }

  /* ── Card surface ────────────────────────────────────── */
  .cf-card {
    background: var(--cf-navy1);
    border: 1px solid var(--cf-cardBorder);
    border-radius: 12px;
    box-shadow: var(--cf-cardShadow);
  }
  /* ── Sidebar shadow ──────────────────────────────────── */
  .cf-sidebar-wrap aside {
    box-shadow: var(--cf-sidebarShadow);
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.25; transform: scale(0.8); }
    50%       { opacity: 1;    transform: scale(1.05); }
  }

  /* ── Responsive helpers ─────────────────────────────── */
  .hide-sm { display: inline; }
  .hide-xs { display: inline; }

  /* App shell root container query */
  .app-root {
    height: 100%;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--cf-navy0);
    container-type: inline-size;
    container-name: app;
    overflow: hidden;
  }

  /* Ensure every flex child in the column chain can shrink */
  .app-root > * { min-height: 0; }
  .app-root main { min-height: 0; }
  .screen-scroll { -webkit-overflow-scrolling: touch; }

  /* Sidebar: shown on tablet+, hidden on mobile */
  .cf-sidebar-wrap {
    display: flex;
    flex-shrink: 0;
    height: 100%;
  }
  /* Mobile bottom nav: hidden on desktop, fixed at bottom on mobile */
  .cf-mobile-nav {
    display: none;
    position: fixed;
    bottom: calc(16px + env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    width: auto;
    height: auto;
    z-index: 200;
    background: transparent;
    border-top: none;
    pointer-events: none;
  }
  .cf-mobile-nav > nav {
    pointer-events: all;
  }

  @container app (max-width: 768px) {
    .hide-sm { display: none !important; }
    .cf-sidebar-wrap { display: none !important; }
    .cf-mobile-nav { display: flex !important; }
    .range-picker { display: none !important; }
    .topbar-mobile-logo { display: flex !important; }
    .topbar-page-title { display: none !important; }
  }
  @container app (max-width: 480px) {
    .hide-xs { display: none !important; }
  }

  /* ── Receipts screen responsive ─────────────────────── */
  .receipt-row {
    align-items: stretch !important;
    flex-direction: column !important;
    gap: var(--space-5) !important;
  }
  .receipt-main {
    width: 100%;
    min-width: 0 !important;
  }
  .receipt-copy {
    min-width: 0;
  }
  .receipt-copy > div {
    white-space: normal !important;
    overflow: visible !important;
    text-overflow: clip !important;
    line-height: var(--leading-snug);
  }
  .receipt-actions {
    width: 100%;
    align-items: stretch !important;
    flex-direction: column !important;
    gap: var(--space-4) !important;
  }
  .receipt-actions > *,
  .receipt-actions button,
  .receipt-actions span {
    width: 100%;
    justify-content: center;
  }
  .receipt-amount {
    text-align: left !important;
  }
  @media (max-width: 1100px) {
    .receipt-row {
      align-items: stretch !important;
      flex-direction: column !important;
      gap: var(--space-5) !important;
      padding: var(--space-7) !important;
    }
    .receipt-main {
      width: 100%;
      min-width: 0 !important;
    }
    .receipt-copy {
      min-width: 0;
    }
    .receipt-copy > div {
      white-space: normal !important;
      overflow: visible !important;
      text-overflow: clip !important;
      line-height: var(--leading-snug);
    }
    .receipt-actions {
      width: 100%;
      align-items: stretch !important;
      flex-direction: column !important;
      gap: var(--space-4) !important;
    }
    .receipt-actions > *,
    .receipt-actions button,
    .receipt-actions span {
      width: 100%;
      justify-content: center;
    }
    .receipt-amount {
      text-align: left !important;
    }
  }
  @container app (max-width: 1100px) {
    .receipt-row {
      align-items: stretch !important;
      flex-direction: column !important;
      gap: var(--space-5) !important;
      padding: var(--space-7) !important;
    }
    .receipt-main {
      width: 100%;
      min-width: 0 !important;
    }
    .receipt-actions {
      width: 100%;
      align-items: stretch !important;
      flex-direction: column !important;
      gap: var(--space-4) !important;
    }
  }
  @media (max-width: 480px) {
    .receipt-filter-bar { flex-direction: column !important; align-items: stretch !important; }
    .receipt-filter-bar > div { justify-content: center; }
    .receipt-filter-bar > button { width: 100%; justify-content: center; }
    .receipt-row {
      align-items: stretch !important;
      flex-direction: column !important;
      gap: var(--space-5) !important;
      padding: var(--space-7) !important;
    }
    .receipt-main {
      width: 100%;
      min-width: 0 !important;
    }
    .receipt-copy {
      min-width: 0;
    }
    .receipt-copy > div {
      white-space: normal !important;
      overflow: visible !important;
      text-overflow: clip !important;
      line-height: var(--leading-snug);
    }
    .receipt-actions {
      width: 100%;
      align-items: stretch !important;
      flex-direction: column !important;
      gap: var(--space-4) !important;
    }
    .receipt-actions > *,
    .receipt-actions button,
    .receipt-actions span {
      width: 100%;
      justify-content: center;
    }
    .receipt-amount {
      text-align: left !important;
    }
  }
  @container app (max-width: 480px) {
    .receipt-filter-bar { flex-direction: column !important; align-items: stretch !important; }
    .receipt-filter-bar > div { justify-content: center; }
    .receipt-filter-bar > button { width: 100%; justify-content: center; }
  }

  @media (max-width: 768px) {
    .hide-sm { display: none !important; }
    .cf-sidebar-wrap { display: none !important; }
    .cf-mobile-nav { display: flex !important; }
    .range-picker { display: none !important; }
    .topbar-mobile-logo { display: flex !important; }
    .topbar-page-title { display: none !important; }
    .topbar-mobile-logo img { max-width: calc(var(--space-12) * 3) !important; object-fit: contain; }
    .topbar-actions { gap: var(--space-1) !important; }
    .topbar-new-job,
    .cf-topbar > div:last-child > button:last-child {
      width: calc(var(--space-10) + var(--space-2)) !important;
      height: calc(var(--space-10) + var(--space-1)) !important;
      padding: 0 !important;
      justify-content: center !important;
      font-size: 0 !important;
    }
    .topbar-new-job span,
    .topbar-new-job svg,
    .cf-topbar > div:last-child > button:last-child span,
    .cf-topbar > div:last-child > button:last-child svg { display: none !important; }
    .topbar-new-job::before,
    .cf-topbar > div:last-child > button:last-child::before {
      content: "+";
      font-size: var(--text-2xl);
      line-height: var(--leading-none);
      font-weight: var(--weight-black);
    }
  }

  .pagination-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-5);
    padding: var(--space-5) var(--space-7);
    border-top: var(--border-thin) var(--color-border);
    background: var(--color-bg-card);
  }
  .pagination-meta {
    font-size: var(--text-sm);
    color: var(--color-text-muted);
  }
  .pagination-actions {
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }
  @media (max-width: 480px) {
    .pagination-bar {
      align-items: stretch;
      flex-direction: column;
    }
    .pagination-actions button {
      flex: 1;
      justify-content: center;
    }
  }
  @media (max-width: 480px) {
    .hide-xs { display: none !important; }
  }

  /* Jobs table: convert to readable cards on small screens */
  @media (max-width: 900px) {
    .jobs-table-shell { display: none !important; }
    .jobs-mobile-list {
      display: flex !important;
      flex-direction: column;
      gap: var(--space-5);
    }
    .jobs-table-header { display: none !important; }
    .table-hscroll > .jobs-table-row { min-width: 0 !important; }
    .jobs-table-row {
      grid-template-columns: minmax(0, 1fr) auto !important;
      gap: var(--space-5) !important;
      padding: var(--space-7) !important;
      align-items: start !important;
    }
    .jobs-table-row > * { min-width: 0; }
    .jobs-cell-job { grid-column: 1 / -1; }
    .jobs-cell-client,
    .jobs-cell-status,
    .jobs-cell-quoted,
    .jobs-cell-cost,
    .jobs-cell-margin {
      display: flex !important;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-5);
      padding: var(--space-3) var(--space-4);
      border: var(--border-thin) var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-bg-secondary);
    }
    .jobs-cell-client::before { content: "Client"; }
    .jobs-cell-status::before { content: "Status"; }
    .jobs-cell-quoted::before { content: "Quoted"; }
    .jobs-cell-cost::before { content: "Cost"; }
    .jobs-cell-margin::before { content: "Margin"; }
    .jobs-cell-client::before,
    .jobs-cell-status::before,
    .jobs-cell-quoted::before,
    .jobs-cell-cost::before,
    .jobs-cell-margin::before {
      font-size: var(--text-xs);
      font-weight: var(--weight-bold);
      letter-spacing: var(--tracking-wider);
      text-transform: uppercase;
      color: var(--color-text-muted);
    }
    .jobs-cell-progress {
      grid-column: 1 / -1;
      padding: var(--space-3) var(--space-4);
      border: var(--border-thin) var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-bg-secondary);
    }
  }
  @container app (max-width: 900px) {
    .jobs-table-shell { display: none !important; }
    .jobs-mobile-list {
      display: flex !important;
      flex-direction: column;
      gap: var(--space-5);
    }
    .jobs-table-header { display: none !important; }
    .table-hscroll > .jobs-table-row { min-width: 0 !important; }
    .jobs-table-row {
      grid-template-columns: minmax(0, 1fr) auto !important;
      gap: var(--space-5) !important;
      padding: var(--space-7) !important;
      align-items: start !important;
    }
  }
  .jobs-mobile-list { display: none; }
  .jobs-mobile-card {
    display: flex;
    flex-direction: column;
    gap: var(--space-5);
    padding: var(--space-7);
  }
  .jobs-mobile-meta {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-4);
  }
  .jobs-mobile-field {
    display: flex;
    flex-direction: column;
    gap: var(--space-1);
    padding: var(--space-3) var(--space-4);
    border: var(--border-thin) var(--color-border);
    border-radius: var(--radius-lg);
    background: var(--color-bg-secondary);
    min-width: 0;
  }
  .jobs-mobile-label {
    font-size: var(--text-xs);
    font-weight: var(--weight-bold);
    letter-spacing: var(--tracking-wider);
    text-transform: uppercase;
    color: var(--color-text-muted);
  }
  .jobs-mobile-value {
    font-family: var(--font-mono);
    font-size: var(--text-base);
    font-weight: var(--weight-bold);
    color: var(--color-text-primary);
  }
  @media (max-width: 420px) {
    .jobs-mobile-meta { grid-template-columns: 1fr; }
  }

  /* ── CashIQ panel (docked right sidebar) ─────────────── */
  .ai-copilot-panel {
    display: flex;
    width: 340px;
    flex-shrink: 0;
    position: relative;
    box-shadow: none;
  }
  .ai-copilot-backdrop { display: none !important; }

  /* Tablet: narrower docked column */
  @media (max-width: 1200px) {
    .ai-copilot-panel { width: 300px; }
  }
  @container app (max-width: 1200px) {
    .ai-copilot-panel { width: 300px; }
  }
  @media (max-width: 1000px) {
    .ai-copilot-panel { width: 280px; }
  }
  @container app (max-width: 1000px) {
    .ai-copilot-panel { width: 280px; }
  }

  /* Tablet + Mobile: hide docked panel, show floating CashIQ button instead */
  @media (max-width: 1100px) {
    .ai-copilot-panel { display: none !important; }
    .cashiq-fab { display: flex !important; }
    .cashiq-sheet { display: block !important; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 1300; }
  }
  @container app (max-width: 1100px) {
    .ai-copilot-panel { display: none !important; }
    .cashiq-fab { display: flex !important; }
    .cashiq-sheet { display: block !important; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 1300; }
  }

  /* Close button only surfaces if user manually dismisses */
  .ai-copilot-close { display: flex !important; }

  /* ── Monday Morning Truth grid ──────────────────────── */
  .mmt-grid {
    display: grid;
    grid-template-columns: minmax(220px,1.1fr) 1px minmax(0,1.4fr) 1px minmax(220px,1.1fr);
  }
  /* Stack to single column earlier to prevent middle col squeeze */
  @media (max-width: 1180px) {
    .mmt-grid { grid-template-columns: minmax(220px,1fr) 1px minmax(0,1.4fr) !important; }
    .mmt-divider-v-2 { display: none !important; }
    .mmt-breakdown-desktop { display: none !important; }
    .mmt-breakdown-mobile { display: block !important; }
    .mmt-view-breakdown-btn { display: flex !important; }
  }
  @container app (max-width: 1180px) {
    .mmt-grid { grid-template-columns: minmax(220px,1fr) 1px minmax(0,1.4fr) !important; }
    .mmt-divider-v-2 { display: none !important; }
    .mmt-breakdown-desktop { display: none !important; }
    .mmt-breakdown-mobile { display: block !important; }
    .mmt-view-breakdown-btn { display: flex !important; }
  }
  @media (max-width: 860px) {
    .mmt-grid { grid-template-columns: 1fr !important; }
    .mmt-divider-v { display: none !important; }
    .mmt-breakdown-desktop { display: none !important; }
    .mmt-breakdown-mobile { display: block !important; }
  }
  @container app (max-width: 860px) {
    .mmt-grid { grid-template-columns: 1fr !important; }
    .mmt-divider-v { display: none !important; }
    .mmt-breakdown-desktop { display: none !important; }
    .mmt-breakdown-mobile { display: block !important; }
  }
  /* Hide "View breakdown" button on desktop (breakdown is already visible in right column) */
  .mmt-view-breakdown-btn { display: none !important; }
  @media (max-width: 860px) { .mmt-view-breakdown-btn { display: flex !important; } }
  @container app (max-width: 1000px) { .mmt-view-breakdown-btn { display: flex !important; } }

  /* ── Asset Total + Net Worth row ───────────────────── */

<body>
<div id="root"></div>

<script type="text/babel" src="Components.jsx?v=tablefix2"></script>
<script type="text/babel" src="ScreenDashboard.jsx?v=tablefix2"></script>
<script type="text/babel" src="Screens.jsx?v=tablefix2"></script>

<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",
  "sidebarCollapsed": false
}/*EDITMODE-END*/;

function App() {
  const [screen, setScreen]       = React.useState('dashboard');
  const [collapsed, setCollapsed] = React.useState(() => {
    const saved = localStorage.getItem('cf_sidebar_collapsed');
    return saved !== null ? saved === 'true' : TWEAK_DEFAULTS.sidebarCollapsed;
  });
  const [tweaks, setTweaks]       = React.useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  // Auto-collapse sidebar on tablet
  React.useEffect(() => {
    if (window.innerWidth <= 1024) setCollapsed(true);
  }, []);

  // Tweaks host protocol
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  const navigate = (id) => {
    setScreen(id);
    localStorage.setItem('cf_screen', id);
  };

  const toggleSidebar = () => {
    const next = !collapsed;
    setCollapsed(next);
    localStorage.setItem('cf_sidebar_collapsed', String(next));
    setTweak('sidebarCollapsed', next);
  };

  const compact = tweaks.density === 'compact';

  const ScreenMap = {
    dashboard:  DashboardScreen,
    forecast:   ForecastScreen,
    jobs:       JobsScreen,
    accounts:   AccountsScreen,
    receipts:   ReceiptsScreen,
    payroll:    PayrollScreen,
    ai:         AIScreen,
    settings:   SettingsScreen,
    onboarding: OnboardingScreen,
  };
  const ScreenComp = ScreenMap[screen] || DashboardScreen;
  const screenLabel = { dashboard:'Dashboard', forecast:'Cash Flow', jobs:'Jobs', accounts:'Accounts', receipts:'Receipts', payroll:'Payroll', ai:'AI Engine', settings:'Settings' }[screen];

  /* Onboarding renders full-screen — no sidebar, no mobile nav */
  if (screen === 'onboarding') {
    return (
      <div className="app-root">
        <OnboardingScreen onNavigate={navigate} />
      </div>
    );
  }

  return (
    <div className="app-root">

      {/* ── App layout ─────────────────────────────── */}
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden', minHeight: 0 }}>

        {/* Sidebar */}
        <div className="cf-sidebar-wrap" style={{ transition: 'width 0.25s cubic-bezier(.4,0,.2,1)', width: collapsed ? 64 : 220, flexShrink: 0, overflow: 'hidden' }}>
          <Sidebar active={screen} onNav={navigate} collapsed={collapsed} onToggle={toggleSidebar} />
        </div>

        {/* Main content */}
        <main style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: 'var(--cf-navy0)', minWidth: 0 }}>
          <ScreenComp compact={compact} onNavigate={navigate} />
        </main>
      </div>

      {/* Mobile bottom nav */}
      <div className="cf-mobile-nav">
        <MobileNav active={screen} onNav={navigate} />
      </div>

      {/* ── Tweaks panel (hidden, kept for host protocol) ── */}
      <div className={`tweaks-panel${tweaksOpen ? ' open' : ''}`} id="tweaks-panel" style={{ display: 'none' }}>
        <div className="tweaks-drag" id="tweaks-drag">
          <div className="tweaks-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#6FE8FF" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M12 2l2 5.5L19.5 9l-5.5 2L12 17l-2-5.5L4.5 9l5.5-2z"/>
            </svg>
            Tweaks
          </div>
          <button onClick={() => { setTweaksOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); }} style={{ background: 'none', border: 'none', color: '#5C6B8A', fontSize: 18, lineHeight: 1, cursor: 'pointer', padding: '0 2px' }}>×</button>
        </div>
        <div className="tweaks-body">

          <div>
            <div className="tweak-label">Density</div>
            <div className="pill-row">
              {['comfortable','compact'].map(v => (
                <button key={v} className={`pill-opt${tweaks.density === v ? ' on' : ''}`} onClick={() => setTweak('density', v)}>
                  {v === 'comfortable' ? 'Comfortable' : 'Compact'}
                </button>
              ))}
            </div>
          </div>

          <div>
            <div className="tweak-label">Sidebar</div>
            <div className="pill-row">
              <button className={`pill-opt${!collapsed ? ' on' : ''}`} onClick={() => { if (collapsed) toggleSidebar(); }}>Expanded</button>
              <button className={`pill-opt${collapsed ? ' on' : ''}`} onClick={() => { if (!collapsed) toggleSidebar(); }}>Collapsed</button>
            </div>
          </div>

          <div className="tweaks-divider" />

          <div style={{ fontSize: 11, color: '#5C6B8A', lineHeight: 1.6 }}>
            Screen: <strong style={{ color: '#9BAAC8' }}>{screenLabel}</strong><br/>
            Main Street Contractors · Apr 27, 2026
          </div>

        </div>
      </div>

    </div>
  );
}

// ── Drag the tweaks panel ─────────────────────────────────────────────
(function() {
  let dragging = false, ox = 0, oy = 0;
  document.addEventListener('mousedown', e => {
    const drag = document.getElementById('tweaks-drag');
    if (drag && drag.contains(e.target)) {
      dragging = true;
      const panel = document.getElementById('tweaks-panel');
      const rect = panel.getBoundingClientRect();
      ox = e.clientX - rect.left; oy = e.clientY - rect.top;
      panel.style.right = 'auto';
      panel.style.bottom = 'auto';
    }
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const panel = document.getElementById('tweaks-panel');
    if (panel) {
      panel.style.left = (e.clientX - ox) + 'px';
      panel.style.top  = (e.clientY - oy) + 'px';
    }
  });
  document.addEventListener('mouseup', () => { dragging = false; });
})();

// Restore persisted theme before first render
(function() {
  const saved = localStorage.getItem('cf-theme');
  if (saved === 'dark') {
    document.documentElement.classList.remove('light-mode');
    document.documentElement.classList.add('dark-mode');
  } else if (saved === 'light') {
    document.documentElement.classList.remove('dark-mode');
    document.documentElement.classList.add('light-mode');
  }
})();

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
